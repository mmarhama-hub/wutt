name: Wutt.net Health Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: wutt-health-monitor
  cancel-in-progress: false

jobs:
  check-status:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fetch wutt.net status
        id: fetch
        run: |
          HTTP=$(curl -sS -L -o status.html -w '%{http_code}' --max-time 15 -A "WuttMonitor" "https://wutt.net/status" || echo "000")
          SIZE=$(wc -c < status.html 2>/dev/null || echo 0)
          echo "http=$HTTP" >> $GITHUB_OUTPUT
          echo "size=$SIZE" >> $GITHUB_OUTPUT

      - name: Check components
        id: check
        if: steps.fetch.outputs.http == '200'
        run: |
          OUT=$(grep -c 'wutt-status-card--outage' status.html || true)
          DEG=$(grep -c 'wutt-status-card--degraded' status.html || true)
          echo "outages=${OUT:-0}" >> $GITHUB_OUTPUT
          echo "degraded=${DEG:-0}" >> $GITHUB_OUTPUT
          {
            echo "affected<<EOF"
            python3 -c "
import re,sys
h=open('status.html').read()
for m in re.finditer(r'wutt-status-card wutt-status-card--(\w+)\"[^>]*>.*?<h4[^>]*>([^<]+)</h4>', h, re.DOTALL):
    s,n=m.group(1),m.group(2).strip()
    if s in ('outage','degraded'):
        print('  -', n, '['+s.upper()+']')
"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Send email alert
        if: steps.fetch.outputs.http != '200' || steps.check.outputs.outages != '0' || steps.check.outputs.degraded != '0'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.hostinger.com
          server_port: '465'
          secure: 'true'
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          from_address: Wutt Monitor <hello@wutt.net>
          to_address: hello@wutt.net
          subject: Wutt status alert
          body: |
            Wutt.net status alert

            Checked at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
            HTTP: ${{ steps.fetch.outputs.http }}
            Page size: ${{ steps.fetch.outputs.size }} bytes

            Outages: ${{ steps.check.outputs.outages }}
            Degraded: ${{ steps.check.outputs.degraded }}

            Affected components:
            ${{ steps.check.outputs.affected }}

            Live status: https://wutt.net/status
            GitHub run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          content_type: text/plain
