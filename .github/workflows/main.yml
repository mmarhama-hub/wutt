name: Wutt.net Health Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: wutt-health-monitor
  cancel-in-progress: false

jobs:
  check-status:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fetch wutt.net status
        id: fetch
        run: |
          HTTP=$(curl -sS -L -o status.html -w '%{http_code}' --max-time 15 -A "WuttMonitor" "https://wutt.net/status" || echo 000)
          echo "http=$HTTP" >> $GITHUB_OUTPUT

      - name: Check components
        id: check
        if: always()
        run: |
          OUT=0
          DEG=0
          if [ -s status.html ]; then
            OUT=$(grep -oE 'wutt-status-card wutt-status-card--outage' status.html 2>/dev/null | wc -l | tr -d ' ' || echo 0)
            DEG=$(grep -oE 'wutt-status-card wutt-status-card--degraded' status.html 2>/dev/null | wc -l | tr -d ' ' || echo 0)
            OUT=${OUT:-0}
            DEG=${DEG:-0}
          fi
          echo "outages=$OUT" >> $GITHUB_OUTPUT
          echo "degraded=$DEG" >> $GITHUB_OUTPUT

      - name: Send email alert
        if: steps.fetch.outputs.http != '200' || steps.check.outputs.outages != '0' || steps.check.outputs.degraded != '0'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.hostinger.com
          server_port: '465'
          secure: 'true'
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          from: Wutt Monitor <hello@wutt.net>
          to: hello@wutt.net
          subject: Wutt status alert
          body: |
            Wutt.net status alert

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            HTTP: ${{ steps.fetch.outputs.http }}
            Outages: ${{ steps.check.outputs.outages }}
            Degraded: ${{ steps.check.outputs.degraded }}

            Check live status: https://wutt.net/status
